services:
  mariadb:
    image: mariadb:10.6
    container_name: fuel-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fuel_db
    ports:
      - "3307:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/localization_data.sql:/docker-entrypoint-initdb.d/02-data.sql